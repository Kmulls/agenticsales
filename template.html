<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    history.scrollRestoration = "manual";
    /* Always open at the top — don't auto-jump to a hash left in the URL by prior navigation. */
    if (location.hash) history.replaceState(null, "", location.pathname + location.search);
  </script>
  <title data-c="meta.title"></title>
  <meta name="description" content="" />
  <meta name="theme-color" content="#0b1f3a" />
  <link rel="icon" type="image/jpeg" href="images/roi-logo.jpeg" />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Stateside — US-grade real estate service, built for Latin America" />
  <meta property="og:description" content="The AI infrastructure and agent training that makes a brokerage perform like a top US firm — a 90-day sprint to a US-grade client experience." />
  <meta property="og:image" content="images/courtyard-home.jpeg" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="es_LA" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="content/site.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ===== Header ===== -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a href="#top" class="brand" aria-label="AI Stack + Proper Training — a Roi Digital Consulting venture">
        <span class="brand-mark" aria-hidden="true"><img src="images/roi-logo.jpeg" alt="" /></span>
        <span class="brand-text">
          <span class="brand-name" data-c="brand.tagline"></span>
          <span class="brand-by">a Roi Digital Consulting venture</span>
        </span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="#problem" data-c="nav.problem"></a>
        <a href="#offer" data-c="nav.offer"></a>
        <a href="#pilot" data-c="nav.pilot"></a>
        <a href="#team" data-c="nav.team"></a>
        <a href="#contact" class="btn btn-sm btn-primary nav-cta" data-c="nav.cta"></a>
        <div class="lang-toggle" role="group" aria-label="Language / Idioma">
          <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
          <button type="button" class="lang-btn" data-lang-btn="es">ES</button>
        </div>
      </nav>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobile-nav" hidden>
      <a href="#problem" data-c="nav.problem"></a>
      <a href="#offer" data-c="nav.offer"></a>
      <a href="#pilot" data-c="nav.pilot"></a>
      <a href="#team" data-c="nav.team"></a>
      <a href="#contact" class="btn btn-primary" data-c="nav.cta"></a>
      <div class="lang-toggle" role="group" aria-label="Language / Idioma">
        <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
        <button type="button" class="lang-btn" data-lang-btn="es">ES</button>
      </div>
    </div>
  </header>

  <main id="main">
    <!-- ===== Hero ===== -->
    <section class="hero" id="top">
      <div class="hero-bg" aria-hidden="true">
        <img src="images/estate-hero.jpeg" alt="" class="hero-photo" loading="eager" fetchpriority="high" />
      </div>
      <div class="container hero-inner">
        <h1 class="hero-title" data-c="hero.title"></h1>
        <p class="hero-sub" data-c="hero.sub"></p>
        <div class="hero-cta">
          <a href="#contact" class="btn btn-primary btn-lg" data-c="hero.ctaPrimary"></a>
          <a href="#offer" class="btn btn-ghost btn-lg" data-c="hero.ctaGhost"></a>
        </div>
        <ul class="hero-stats" aria-label="Key figures">
          <li><span class="stat-num" data-c="hero.stats.0.num"></span><span class="stat-label" data-c="hero.stats.0.label"></span></li>
          <li><span class="stat-num" data-c="hero.stats.1.num"></span><span class="stat-label" data-c="hero.stats.1.label"></span></li>
          <li><span class="stat-num" data-c="hero.stats.2.num"></span><span class="stat-label" data-c="hero.stats.2.label"></span></li>
        </ul>
      </div>
    </section>

    <!-- ===== Problem ===== -->
    <section class="section problem" id="problem">
      <div class="container">
        <div class="section-head reveal">
          <span class="kicker" data-c="problem.kicker"></span>
          <h2 data-c="problem.heading"></h2>
        </div>
        <div class="problem-grid">
          <p class="problem-lead reveal" data-c="problem.lead1"></p>
          <p class="problem-lead reveal" data-c="problem.lead2"></p>
        </div>
        <ul class="expectation-list reveal" aria-label="What American clients expect">
          <li data-c="problem.expectations.0"></li>
          <li data-c="problem.expectations.1"></li>
          <li data-c="problem.expectations.2"></li>
          <li data-c="problem.expectations.3"></li>
        </ul>
      </div>
    </section>

    <!-- ===== Showcase band ===== -->
    <section class="showcase" aria-label="Featured properties">
      <img src="images/courtyard-home.jpeg" alt="A restored colonial courtyard home with a pool" class="showcase-img" loading="lazy" />
      <div class="showcase-overlay">
        <div class="container">
          <blockquote class="reveal">
            <p data-c="showcase.quote"></p>
            <cite data-c="showcase.cite"></cite>
          </blockquote>
        </div>
      </div>
    </section>

    <!-- ===== Offer ===== -->
    <section class="section offer" id="offer">
      <div class="container">
        <div class="section-head reveal">
          <span class="kicker" data-c="offer.kicker"></span>
          <h2 data-c="offer.heading"></h2>
          <p class="section-intro" data-c="offer.intro"></p>
        </div>

        <!-- Layer 1 -->
        <div class="layer reveal">
          <div class="layer-head">
            <span class="layer-tag" data-c="offer.layer1.tag"></span>
            <h3 data-c="offer.layer1.heading"></h3>
            <p class="layer-subtitle" data-c="offer.layer1.subtitle"></p>
            <div class="layer-copy" data-c="offer.layer1.body"></div>
          </div>
          <div class="agentic-grid">
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.0.letter"></span>
              <h4 data-c="offer.agentic.0.title"></h4>
              <p data-c="offer.agentic.0.body"></p>
            </article>
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.1.letter"></span>
              <h4 data-c="offer.agentic.1.title"></h4>
              <p data-c="offer.agentic.1.body"></p>
            </article>
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.2.letter"></span>
              <h4 data-c="offer.agentic.2.title"></h4>
              <p data-c="offer.agentic.2.body"></p>
            </article>
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.3.letter"></span>
              <h4 data-c="offer.agentic.3.title"></h4>
              <p data-c="offer.agentic.3.body"></p>
            </article>
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.4.letter"></span>
              <h4 data-c="offer.agentic.4.title"></h4>
              <p data-c="offer.agentic.4.body"></p>
            </article>
            <article class="agentic-card">
              <span class="agentic-letter" data-c="offer.agentic.5.letter"></span>
              <h4 data-c="offer.agentic.5.title"></h4>
              <p data-c="offer.agentic.5.body"></p>
            </article>
            <article class="agentic-card agentic-card--wide">
              <span class="agentic-letter" data-c="offer.agentic.6.letter"></span>
              <h4 data-c="offer.agentic.6.title"></h4>
              <p data-c="offer.agentic.6.body"></p>
            </article>
          </div>
        </div>

        <!-- Layer 2 -->
        <div class="layer reveal">
          <div class="layer-head">
            <span class="layer-tag" data-c="offer.layer2.tag"></span>
            <h3 data-c="offer.layer2.heading"></h3>
            <p class="layer-subtitle" data-c="offer.layer2.subtitle"></p>
            <div class="layer-copy" data-c="offer.layer2.body"></div>
          </div>
          <ul class="training-list">
            <li>
              <h4 data-c="offer.training.0.title"></h4>
              <p data-c="offer.training.0.body"></p>
            </li>
            <li>
              <h4 data-c="offer.training.1.title"></h4>
              <p data-c="offer.training.1.body"></p>
            </li>
            <li>
              <h4 data-c="offer.training.2.title"></h4>
              <p data-c="offer.training.2.body"></p>
            </li>
            <li>
              <h4 data-c="offer.training.3.title"></h4>
              <p data-c="offer.training.3.body"></p>
            </li>
            <li>
              <h4 data-c="offer.training.4.title"></h4>
              <p data-c="offer.training.4.body"></p>
            </li>
          </ul>
        </div>

        <div class="layer reveal offer-coda"><h3 data-c="offer.automate.heading"></h3><div class="layer-copy" data-c="offer.automate.body"></div></div>
        <div class="layer reveal offer-roi"><h3 data-c="offer.roi.heading"></h3><div class="layer-copy" data-c="offer.roi.body"></div></div>
      </div>
    </section>

    <!-- ===== 90-Day Sprint ===== -->
    <section class="section pilot" id="pilot">
      <div class="container">
        <div class="section-head reveal">
          <span class="kicker" data-c="pilot.kicker"></span>
          <h2 data-c="pilot.heading"></h2>
        </div>

        <div class="pilot-grid">
          <article class="pilot-card reveal">
            <h3 data-c="pilot.cards.0.heading"></h3>
            <p data-c="pilot.cards.0.body"></p>
          </article>
          <article class="pilot-card reveal">
            <h3 data-c="pilot.cards.1.heading"></h3>
            <ul>
              <li data-c="pilot.cards.1.items.0"></li>
              <li data-c="pilot.cards.1.items.1"></li>
              <li data-c="pilot.cards.1.items.2"></li>
            </ul>
          </article>
          <article class="pilot-card reveal">
            <h3 data-c="pilot.cards.2.heading"></h3>
            <p data-c="pilot.cards.2.body"></p>
          </article>
        </div>

        <!-- Pricing -->
        <div class="pricing reveal">
          <div class="pricing-head">
            <h3 data-c="pilot.pricing.heading"></h3>
          </div>
          <div class="pricing-cards">
            <div class="price-card">
              <span class="price-label" data-c="pilot.pricing.cards.0.label"></span>
              <span class="price-amount" data-c="pilot.pricing.cards.0.amount"></span>
            </div>
            <div class="price-card">
              <span class="price-label" data-c="pilot.pricing.cards.1.label"></span>
              <span class="price-amount" data-c="pilot.pricing.cards.1.amount"></span>
            </div>
            <div class="price-card">
              <span class="price-label" data-c="pilot.pricing.cards.2.label"></span>
              <span class="price-amount" data-c="pilot.pricing.cards.2.amount"></span>
            </div>
          </div>

          <div class="math reveal">
            <h4 data-c="pilot.math.heading"></h4>
            <p data-c="pilot.math.body"></p>
            <p class="math-context" data-c="pilot.math.context"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Team ===== -->
    <section class="section team" id="team">
      <div class="container">
        <div class="section-head reveal">
          <span class="kicker" data-c="team.kicker"></span>
          <h2 data-c="team.heading"></h2>
        </div>
        <div class="team-grid">
          <article class="team-card reveal">
            <div class="team-avatar team-avatar--photo">
              <img src="images/kevin-mullaney.jpeg" alt="Kevin Mullaney" loading="lazy" />
            </div>
            <div class="team-body">
              <h3 data-c="team.members.0.name"></h3>
              <p class="team-role" data-c="team.members.0.role"></p>
              <p data-c="team.members.0.bio"></p>
            </div>
          </article>
          <article class="team-card reveal">
            <div class="team-avatar team-avatar--photo">
              <img src="images/milesheadshot.png" alt="Miles Vidor" loading="lazy"
                   data-fallbacks="images/milesheadshot.jpg,images/milesheadshot.jpeg,images/miles-vidor.jpeg"
                   onerror="var f=(this.dataset.fallbacks||'').split(',').filter(Boolean);if(f.length){this.dataset.fallbacks=f.slice(1).join(',');this.src=f[0];}else{var a=this.closest('.team-avatar');a.classList.remove('team-avatar--photo');a.textContent='M';}" />
            </div>
            <div class="team-body">
              <h3 data-c="team.members.1.name"></h3>
              <p class="team-role" data-c="team.members.1.role"></p>
              <p data-c="team.members.1.bio"></p>
            </div>
          </article>
        </div>
      </div>
    </section>

    <!-- ===== Where this goes ===== -->
    <section class="section corridor" id="corridor">
      <div class="container">
        <div class="section-head reveal">
          <span class="kicker" data-c="corridor.kicker"></span>
          <h2 data-c="corridor.heading"></h2>
        </div>
      </div>
    </section>

    <!-- ===== Manifesto ===== -->
    <section class="section manifesto">
      <div class="container manifesto-inner reveal">
        <p class="manifesto-body" data-c="manifesto.body"></p>
        <p class="manifesto-close" data-c="manifesto.close"></p>
      </div>
    </section>

    <!-- ===== CTA / Contact ===== -->
    <section class="section cta" id="contact">
      <img src="images/twilight-estate.webp" alt="" class="cta-photo" loading="lazy" />
      <div class="container cta-inner reveal">
        <h2 data-c="cta.heading"></h2>
        <p data-c="cta.body"></p>
        <form class="cta-form" data-endpoint="https://formspree.io/f/xdavyykk" method="post" novalidate>
          <div class="form-row">
            <label class="sr-only" for="name">Name</label>
            <input id="name" name="name" type="text" data-cph="form.namePlaceholder" autocomplete="name" required />
            <label class="sr-only" for="email">Email</label>
            <input id="email" name="email" type="email" data-cph="form.emailPlaceholder" autocomplete="email" required />
          </div>
          <div class="form-row">
            <label class="sr-only" for="brokerage">Brokerage &amp; market</label>
            <input id="brokerage" name="brokerage" type="text" data-cph="form.brokeragePlaceholder" />
            <button type="submit" class="btn btn-primary btn-lg" data-c="form.submitLabel"></button>
          </div>
          <p class="form-status" role="status" aria-live="polite" hidden></p>
        </form>
      </div>
    </section>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="roi-logo">
          <img src="images/roi-logo.jpeg" alt="Roi Digital Consulting LLC" width="690" height="692" loading="lazy" />
        </span>
        <p data-c="footer.brand"></p>
      </div>
      <nav class="footer-nav" aria-label="Footer">
        <a href="#problem" data-c="footer.navProblem"></a>
        <a href="#offer" data-c="footer.navOffer"></a>
        <a href="#pilot" data-c="footer.navPilot"></a>
        <a href="#team" data-c="footer.navTeam"></a>
        <a href="#contact" data-c="footer.navContact"></a>
      </nav>
    </div>
    <div class="container footer-legal">
      <span data-c="footer.legal"></span>
    </div>
  </footer>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
